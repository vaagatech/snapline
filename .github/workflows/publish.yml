name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Validate tag format
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}$ ]]; then
            echo "Tag '$TAG' does not match required format v{major}.{minor}.{patch} (each segment 1-3 digits)"
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        id: tag

      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify package versions match tag
        run: node scripts/sync-versions.mjs --check "${{ steps.tag.outputs.version }}"

      - name: Publish packages to npm
        run: npm run publish:packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Bump version on main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git checkout main

          RELEASE_VERSION="${{ steps.tag.outputs.version }}"
          NEXT_VERSION="$(node scripts/sync-versions.mjs --bump-patch "$RELEASE_VERSION")"

          node scripts/sync-versions.mjs "$NEXT_VERSION"
          npm install

          git add package.json package-lock.json \
            packages/core/package.json \
            packages/auth-adapters/package.json \
            packages/reconcile/package.json \
            packages/api-adapters/package.json \
            demo/package.json

          git commit -m "chore: bump version to ${NEXT_VERSION} after v${RELEASE_VERSION} release"
          git push origin main
